version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:7.0
    container_name: dating_app_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: dating_app
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - dating_app_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dating_app_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # MongoDB Configuration
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/dating_app?authSource=admin
      DATABASE_NAME: dating_app
      
      # JWT Configuration
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-this-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      
      # CORS Configuration
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      CORS_ALLOW_CREDENTIALS: "true"
      
      # Cloudinary Configuration (optional)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      
      # Storage Configuration
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      LOCAL_STORAGE_PATH: ./uploads
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-for-password-hashing-change-this-in-production}
      
      # Rate Limiting
      RATE_LIMIT_PER_MINUTE: 100
      LOGIN_RATE_LIMIT_PER_MINUTE: 5
      
      # Application Settings
      DEBUG: "false"
      API_PREFIX: /api/v1
      PROJECT_NAME: "Dating App API"
    
    depends_on:
      mongodb:
        condition: service_healthy
    
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    
    networks:
      - dating_app_network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  dating_app_network:
    driver: bridge
